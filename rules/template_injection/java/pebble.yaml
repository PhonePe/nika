rules:
  - id: java-pebble-ssti-sink
    languages: [java]
    severity: ERROR
    message: "Potential SSTI: Pebble engine getting a template from a non-literal string."
    metadata:
      cwe: "CWE-94"
      technology: [pebble]
    patterns:
      - pattern: $ENGINE.getTemplate($INPUT)
      - metavariable-type:
          metavariable: $ENGINE
          types:
            - PebbleEngine
            - io.pebbletemplates.pebble.PebbleEngine
            - com.mitchellbosecke.pebble.PebbleEngine
      - pattern-not: $ENGINE.getTemplate("...")
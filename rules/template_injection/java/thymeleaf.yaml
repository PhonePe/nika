rules:
  - id: java-thymeleaf-ssti-sink
    languages: [java]
    severity: ERROR
    message: "Potential SSTI: Thymeleaf processing a dynamic template string."
    metadata:
      cwe: "CWE-94"
      technology: [thymeleaf, spring]
    patterns:
      - pattern: $ENGINE.process($INPUT, ...)
      - metavariable-type:
          metavariable: $ENGINE
          types:
            - TemplateEngine
            - ITemplateEngine
            - org.thymeleaf.TemplateEngine
            - org.thymeleaf.ITemplateEngine
      - pattern-not: $ENGINE.process("...", ...)

  - id: java-spel-ssti-sink
    languages: [java]
    severity: ERROR
    message: "Potential SSTI: SpEL parsing a dynamic expression string."
    metadata:
      cwe: "CWE-94"
      technology: [spring, spel]
    patterns:
      - pattern: $PARSER.parseExpression($INPUT)
      - metavariable-type:
          metavariable: $PARSER
          types:
            - ExpressionParser
            - SpelExpressionParser
            - org.springframework.expression.ExpressionParser
            - org.springframework.expression.spel.standard.SpelExpressionParser
      - pattern-not: $PARSER.parseExpression("...")

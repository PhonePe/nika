rules:
  - id: java-mustache-ssti-sink
    languages: [java]
    severity: ERROR
    message: "Potential SSTI: Mustache compiling a template from a dynamic source."
    metadata:
      cwe: "CWE-94"
      technology: [mustache]
    patterns:
      - pattern-either:
          - pattern: $FACTORY.compile(new StringReader($INPUT), ...)
          - pattern: $FACTORY.compile(new java.io.StringReader($INPUT), ...)
          - pattern: $FACTORY.compile($INPUT)
          - pattern: $FACTORY.compile($INPUT, ...)
      - metavariable-type:
          metavariable: $FACTORY
          types:
            - MustacheFactory
            - com.github.mustachejava.MustacheFactory
            - DefaultMustacheFactory
            - com.github.mustachejava.DefaultMustacheFactory
      # Filter out safe, hardcoded templates
      - pattern-not: $FACTORY.compile("...", ...)
      - pattern-not: $FACTORY.compile("...")
      - pattern-not: $FACTORY.compile(new StringReader("..."), ...)
      - pattern-not: $FACTORY.compile(new java.io.StringReader("..."), ...)
